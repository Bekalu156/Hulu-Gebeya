<!DOCTYPE html>

<head>

</head>
<body>

  <nav class="navbar">
    <img class="logo" src="img/186b616da8f344a9ba737d38646078bf-removebg-preview.png" alt="Huluገበያ">

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>

    <div class="nav-icons">
        <span id="search-icon">🔍</span>
        <a href="cart.html"><span>🛒</span></a>
      </div>

      <div class="search-box" id="search-box">
        <input type="text" placeholder="Search products..." id="search-input">
      </div>
  </nav>

  <section class="contact-section">
    <div class="contact-container">
      <div class="contact-info">
        <h1>Get In Touch</h1>
        <p>ስለ ምርቶች፣ ትዕዛዞች ወይም መላኪያ ጥያቄዎች አሉዎት? በማንኛውም ጊዜ ቡድናችንን ያግኙ።</p>

        <div class="info-box">
          <h3>ኢ-ሜይል</h3>
          <p>support@Huluገበያ.com</p>
        </div>

        <div class="info-box">
          <h3>ስልክ</h3>
          <p>+251 934 02 73 73</p>
        </div>

        <div class="info-box">
          <h3>አድራሻ</h3>
          <p>Bahir Dar, Ethiopia</p>
        </div>
      </div>

      <form class="contact-form">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <input type="text" placeholder="Subject" required>
        <textarea rows="6" placeholder="Your Message" required></textarea>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </div>
  </section>

  <script src="main.js"></script>
