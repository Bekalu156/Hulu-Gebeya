<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">

  <!-- html2canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

<nav class="navbar">
  <h2>Checkout</h2>
</nav>

<section class="checkout-page">
  <div class="checkout-container">

    <!-- FORM -->
    <div class="checkout-form">
      <h3>Billing Details</h3>

      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="phone" placeholder="Phone Number">
      <input type="text" id="address" placeholder="Address">
      <input type="text" id="city" placeholder="City">

      <h3>Payment Method</h3>

      <select id="payment">
        <option value="cash">Cash on Delivery</option>
        <option value="telebirr">Telebirr</option>
      </select>

      <!-- TELEBIRR -->
      <div id="telebirr-box" style="display:none;">
        <p>Send to: <strong>+2519XXXXXXXX</strong></p>
        <input type="text" id="tx-id" placeholder="Transaction ID">
      </div>

      <button id="place-order">Place Order</button>
    </div>

    <!-- SUMMARY -->
    <div class="checkout-summary">
      <h3>Your Order</h3>
      <div class="checkout-items"></div>
      <h4 id="checkout-total">Total: $0</h4>
    </div>

  </div>
</section>

<!-- RECEIPT (IMAGE SOURCE) -->
<div id="receipt" style="
  width:320px;
  padding:15px;
  background:#fff;
  font-family:Arial;
  border-radius:10px;
  display:none;
">
  <h3 style="text-align:center;">🛒 Order Receipt</h3>

  <p id="r-name"></p>
  <p id="r-phone"></p>
  <p id="r-address"></p>
  <p id="r-payment"></p>
  <p id="r-tx"></p>

  <div id="r-items"></div>

  <h4 id="r-total"></h4>
</div>

<script src="checkout.js"></script>
</body>
</html>
